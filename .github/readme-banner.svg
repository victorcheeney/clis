<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">CLIs.dev README banner</title>
  <desc id="desc">CLIs are how AI agents get work done. The difference between chat and action is tools. Find your new favorite CLI tools on CLIs.dev.</desc>

  <defs>
    <linearGradient id="borderGlow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#79f08a"/>
      <stop offset="100%" stop-color="#4de7a8"/>
    </linearGradient>
    <radialGradient id="rightGlow" cx="82%" cy="40%" r="46%">
      <stop offset="0%" stop-color="#113f25" stop-opacity="0.95"/>
      <stop offset="42%" stop-color="#0c2015" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#050606" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="16%" cy="92%" r="52%">
      <stop offset="0%" stop-color="#0f2417" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#050606" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="#050606"/>
  <rect width="1280" height="640" fill="url(#rightGlow)"/>
  <rect width="1280" height="640" fill="url(#leftGlow)"/>
  <rect x="20" y="20" width="1240" height="600" rx="18" fill="none" stroke="#0f1713" stroke-width="2"/>

  <text x="92" y="116" fill="#79f08a" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" letter-spacing="7">THE INTERFACE LAYER FOR THE AGENT ERA</text>

  <text x="92" y="248" fill="#f3f3f1" font-family="Helvetica, Arial, sans-serif" font-size="92" font-weight="700" letter-spacing="-4">CLIs are how</text>
  <text x="92" y="358" fill="#79f08a" font-family="Helvetica, Arial, sans-serif" font-size="108" font-weight="700" letter-spacing="-5">AI agents</text>
  <text x="92" y="468" fill="#f3f3f1" font-family="Helvetica, Arial, sans-serif" font-size="92" font-weight="700" letter-spacing="-4">get work done</text>

  <text x="92" y="540" fill="#a6a8b0" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="400">The difference between chat and action is tools.</text>
  <text x="92" y="578" fill="#a6a8b0" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="400">Find your new favorite CLI tools on CLIs.dev.</text>

  <rect x="956" y="464" width="206" height="42" rx="21" fill="#0b1510" stroke="url(#borderGlow)" stroke-width="1.5"/>
  <text x="993" y="491" fill="#79f08a" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="600">300+ CLI tools</text>

  <rect x="956" y="516" width="206" height="42" rx="21" fill="#0b1510" stroke="#243329" stroke-width="1.5"/>
  <text x="1004" y="543" fill="#c6c8ce" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="500">Open source</text>
</svg>
